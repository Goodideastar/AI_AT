# =====================================================================
# AI_AT 量化交易平台 - Docker Compose 编排
# 包含服务：mysql / redis / backend / frontend
# 启动：docker compose up -d
# 查看日志：docker compose logs -f backend
# 停止：docker compose down
# 重建：docker compose up -d --build
# =====================================================================

services:
  # ── MySQL 数据库 ──
  mysql:
    image: mysql:8.0
    container_name: aiat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456789}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ATDB}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=512M
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456789}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aiat_network

  # ── Redis 缓存 ──
  redis:
    image: redis:7-alpine
    container_name: aiat_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456789} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456789}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aiat_network

  # ── 后端 FastAPI 服务 ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiat_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # 覆盖 .env 中的连接地址，使用容器内服务名
      DB_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-123456789}@mysql:3306/${MYSQL_DATABASE:-ATDB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456789}
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - aiat_network

  # ── 前端 Nginx 服务 ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_API_BASE_URL=
    container_name: aiat_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - aiat_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  aiat_network:
    driver: bridge
